site_name: Squish
site_description: "Run 70B language models on a MacBook. Squish compresses model weights into memory-mapped INT8 tensors that load in milliseconds."
site_url: https://squish.run
repo_url: https://github.com/squishai/squish
repo_name: squishai/squish

theme:
  name: material
  custom_dir: overrides
  logo: assets/squish-logo.png
  favicon: assets/squish-logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - search
  - exclude:
      glob:
        - "final/**"
        - "*.docx"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .        # relative to mkdocs.yml (repo root)
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: install.md
  - Quickstart: quickstart.md
  - API Reference: api.md
  - Architecture: ARCHITECTURE.md
  - Contributing: contributing.md
  - Planning:
    - Roadmap: planning/PLAN.md
    - Modules: planning/MODULES.md
    - Cross-Platform: planning/CROSS_PLATFORM_PLAN.md
    - CLI Revamp: planning/CLI_REVAMP_PLAN.md
    - INT Quantization: planning/INT_QUANTIZATION_BENCHMARK_PLAN.md
    - Launch Status: planning/LAUNCH_STATUS_v9.md
    - Phase 3+4 Guide: planning/PHASE_3_4_COMPLETION_GUIDE.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/squishai/squish
    - icon: fontawesome/brands/discord
      link: https://discord.gg/squish
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/squish/

extra_css:
  - stylesheets/extra.css
