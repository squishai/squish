name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: macos-14            # Apple Silicon runner (M1)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check squish/ tests/ --output-format github

      - name: Verify version consistency
        run: |
          python -c "
          import importlib.metadata, squish
          meta = importlib.metadata.version('squish')
          pkg  = squish.__version__
          assert meta == pkg, f'Version mismatch: metadata={meta!r} vs squish.__version__={pkg!r}'
          print(f'squish version OK: {pkg}')
          "

      - name: Run tests
        # Excluded from CI:
        #   test_git_integration.py - live-server integration requiring model weights.
        #                             Run: pytest tests/test_git_integration.py --model qwen3:8b
        run: |
          pytest tests/ \
            --ignore=tests/test_git_integration.py \
            -v --tb=short -q

  lint-only:
    # Runs on Linux for fast feedback on PRs from forks (no Apple Silicon needed)
    name: Lint (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff + mypy
        run: pip install ruff mypy

      - name: ruff check
        run: ruff check squish/ tests/ --output-format github

      - name: mypy check
        run: mypy squish/ --ignore-missing-imports --no-error-summary || true

  test-linux:
    name: Test Linux (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check squish/ tests/ --output-format github

      - name: Run tests (Linux — MLX tests auto-skipped)
        # MLX-dependent tests skip automatically on Linux via pytest.importorskip.
        # test_int4_loader.py excluded: requires squish_quant Rust extension
        #   which needs cargo/maturin on the runner.
        # test_git_integration.py excluded: requires live model weights.
        run: |
          pytest tests/ \
            --ignore=tests/test_int4_loader.py \
            --ignore=tests/test_git_integration.py \
            -v --tb=short -q
